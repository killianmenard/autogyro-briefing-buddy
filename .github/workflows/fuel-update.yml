# Regénère fuel.json depuis les fiches AD-2 du SIA (rubrique 10-AVT).
# Tourne tout seul (cron hebdo) : il calcule le cycle AIRAC courant, télécharge
# chaque AD-2.{ICAO}.pdf, parse le bloc 10-AVT, et commit fuel.json s'il a changé.
# Garde-fou : si la couverture s'effondre, le script échoue (exit 2) -> aucun
# commit, et une issue est ouverte automatiquement.
name: MAJ avitaillement (fuel.json)

on:
  schedule:
    - cron: "17 4 * * 1"   # tous les lundis à 04h17 UTC (capte le changement de cycle sous 7 j)
  workflow_dispatch: {}     # bouton "Run workflow" pour un lancement manuel immédiat

permissions:
  contents: write           # pour committer fuel.json
  issues: write             # pour ouvrir une issue si le garde-fou se déclenche

concurrency:
  group: fuel-update
  cancel-in-progress: false

jobs:
  update-fuel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Installer poppler (fournit pdftotext)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Générer fuel.json
        run: python3 scripts/parse_fuel.py

      - name: Committer fuel.json si modifié
        if: success()
        run: |
          if [ -n "$(git status --porcelain fuel.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add fuel.json
            git commit -m "MAJ fuel.json (AD-2 10-AVT) [skip ci]"
            git push
            echo "fuel.json mis à jour et poussé."
          else
            echo "Aucun changement de fuel.json."
          fi

      - name: Ouvrir une issue si échec (garde-fou ou erreur)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⚠️ MAJ fuel.json échouée — fuel.json NON modifié",
              body: [
                "Le job de génération de `fuel.json` a échoué.",
                "",
                "Causes possibles :",
                "- **Garde-fou** : effondrement de la couverture (le SIA a peut-être changé la mise en page des fiches AD-2, ou bloqué les requêtes).",
                "- Erreur réseau / `pdftotext` indisponible.",
                "",
                "`fuel.json` n'a **pas** été modifié (aucune fausse donnée livrée).",
                "Voir les logs du run : " + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join("\n")
            })
